<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EA FC 26 — Associação BF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ===== Main Layout ===== */
    .app-container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ===== Main Content Grid ===== */
    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 850px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===== Left Column ===== */
    .left-column {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* ===== Right Column (Card) ===== */
    .right-column {
      position: sticky;
      top: 1rem;
    }

    @media (max-width: 850px) {
      .right-column {
        position: static;
      }
    }

    /* ===== Panel Base ===== */
    .panel {
      background: linear-gradient(160deg, #1a1f26 0%, #161b22 50%, #12161c 100%);
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-title {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #58a6ff;
      padding: 0.55rem 0.85rem 0.45rem;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid #21262d;
    }

    .panel-body {
      padding: 0.65rem 0.85rem;
    }

    /* ===== Actions Panel ===== */
    .actions-panel .panel-body {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: none;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:focus { outline: 2px solid #58a6ff; outline-offset: 2px; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: default; }

    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2ea043; }

    .btn-icon { font-size: 0.9rem; }

    /* ===== Monitoring Status (inline in actions) ===== */
    .monitoring-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.65rem;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      font-size: 0.75rem;
    }

    .monitoring-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .monitoring-status.active .monitoring-dot { background: #3fb950; }
    .monitoring-status.inactive .monitoring-dot { background: #6e7681; }

    .monitoring-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .monitoring-state {
      font-weight: 600;
      color: #e6edf3;
    }

    .monitoring-status.active .monitoring-state { color: #7ee787; }
    .monitoring-status.inactive .monitoring-state { color: #8b949e; }

    .monitoring-detail {
      font-size: 0.68rem;
      color: #8b949e;
    }

    /* ===== Feedback ===== */
    .feedback-container { overflow: hidden; }

    .feedback {
      padding: 0.5rem 0.85rem;
      font-size: 0.75rem;
      line-height: 1.35;
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
    }

    .feedback-icon { font-size: 0.9rem; flex-shrink: 0; }
    .feedback-text { flex: 1; }
    .feedback-summary { font-weight: 600; margin-top: 0.15rem; }

    .feedback.success { background: rgba(35, 134, 54, 0.15); border-top: 1px solid rgba(35, 134, 54, 0.3); color: #7ee787; }
    .feedback.info { background: rgba(88, 166, 255, 0.1); border-top: 1px solid rgba(88, 166, 255, 0.2); color: #79c0ff; }
    .feedback.warning { background: rgba(210, 153, 34, 0.15); border-top: 1px solid rgba(210, 153, 34, 0.3); color: #d29922; }
    .feedback.error { background: rgba(248, 81, 73, 0.15); border-top: 1px solid rgba(248, 81, 73, 0.3); color: #f85149; }

    /* ===== Latest Match Panel ===== */
    .match-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .match-team {
      font-size: 0.75rem;
      font-weight: 600;
      color: #c9d1d9;
      max-width: 95px;
      text-align: center;
      line-height: 1.15;
    }

    .match-score {
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .match-score-sep { font-size: 0.85rem; color: #6e7681; }

    .match-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      font-size: 0.68rem;
      color: #8b949e;
    }

    .result-badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 8px;
      font-size: 0.55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .result-badge.win { background: #238636; color: #fff; }
    .result-badge.draw { background: #6e7681; color: #fff; }
    .result-badge.loss { background: #da3633; color: #fff; }

    .match-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #30363d, transparent);
      margin: 0.5rem 0;
    }

    .match-status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      color: #8b949e;
    }

    .match-status-icon { font-size: 0.78rem; }
    .match-status.published { color: #7ee787; }
    .match-status.simulated { color: #f0883e; }

    .empty-state {
      text-align: center;
      padding: 0.85rem 0;
      color: #8b949e;
      font-size: 0.78rem;
    }

    .empty-state-icon { font-size: 1.3rem; margin-bottom: 0.25rem; opacity: 0.6; }

    /* ===== Developer Panel ===== */
    .dev-panel {
      border: 1px dashed #f0883e;
      background: linear-gradient(135deg, rgba(240, 136, 62, 0.05), transparent);
    }

    .dev-panel .panel-title { color: #f0883e; }

    .dev-info {
      margin-bottom: 0.5rem;
      padding: 0.35rem 0.55rem;
      background: rgba(240, 136, 62, 0.1);
      border-radius: 5px;
      font-size: 0.68rem;
    }

    .dev-info-text { color: #f0883e; }

    .dev-actions {
      display: flex;
      gap: 0.4rem;
    }

    .dev-actions .btn { flex: 1; }

    .btn-outline { background: transparent; color: #58a6ff; border: 1px solid #30363d; }
    .btn-outline:hover:not(:disabled) { background: rgba(88, 166, 255, 0.1); border-color: #58a6ff; }

    .dev-status {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: #8b949e;
      min-height: 1em;
    }

    .dev-status.success { color: #3fb950; }
    .dev-status.error { color: #f85149; }
    .dev-status.simulated { color: #f0883e; }

    /* ===== Settings Panel ===== */
    .settings-panel {
      padding: 0.5rem 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #8b949e;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
    }

    .settings-link:hover { color: #58a6ff; }

    .network-url { font-size: 0.68rem; color: #6e7681; }
    .network-url a { color: #58a6ff; text-decoration: none; }

    /* ===== Right Column (Card Area) ===== */
    .right-column.simulated .simulation-indicator {
      display: flex;
    }

    .simulation-indicator {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      margin-bottom: 0.5rem;
      background: rgba(240, 136, 62, 0.12);
      border: 1px dashed rgba(240, 136, 62, 0.4);
      border-radius: 8px;
      font-size: 0.78rem;
      color: #f0883e;
    }

    .card-empty {
      text-align: center;
      padding: 3rem 1.5rem;
      color: #6e7681;
    }

    .card-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.6rem;
      opacity: 0.5;
    }

    .card-empty-text {
      font-size: 0.85rem;
    }

    /* Inner card canvas - centered with max-width */
    .card-canvas {
      max-width: 420px;
      margin: 0 auto;
      padding: 0.75rem;
    }

    .match-card {
      background: linear-gradient(160deg, #1a1f26 0%, #161b22 50%, #12161c 100%);
      border-radius: 12px;
      border: 1px solid #30363d;
      overflow: hidden;
    }

    /* Strong header with dominant score */
    .card-header {
      padding: 1rem 1.25rem;
      text-align: center;
      background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), transparent);
    }

    .card-result-badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .card-result-badge.win { background: rgba(63, 185, 80, 0.25); color: #3fb950; }
    .card-result-badge.loss { background: rgba(248, 81, 73, 0.25); color: #f85149; }
    .card-result-badge.draw { background: rgba(139, 148, 158, 0.25); color: #8b949e; }

    .card-score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 0.4rem 0;
    }

    .card-team-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e6edf3;
      max-width: 110px;
      text-align: center;
      line-height: 1.2;
    }

    .card-score {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 1.75rem;
      font-weight: 800;
      color: #ffffff;
    }

    .card-score-sep {
      color: #6e7681;
      font-size: 1.1rem;
      font-weight: 400;
    }

    .card-date {
      font-size: 0.7rem;
      color: #8b949e;
      margin-top: 0.4rem;
    }

    /* Card body with proper spacing */
    .card-body {
      padding: 0 1.25rem 1rem;
    }

    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #30363d 20%, #30363d 80%, transparent);
      margin: 0.75rem 0;
    }

    /* Section blocks */
    .card-section {
      margin-bottom: 0.5rem;
    }

    .card-section-title {
      font-size: 0.65rem;
      font-weight: 700;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    /* Goals/Assists - only section that uses two columns */
    .card-goals-assists {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
    }

    .card-goals-assists > .card-section:nth-child(1) {
      padding-right: 0.75rem;
    }

    .card-goals-assists > .card-section:nth-child(3) {
      padding-left: 0.75rem;
    }

    .card-goals-divider {
      width: 1px;
      background: linear-gradient(180deg, transparent 0%, #30363d 20%, #30363d 80%, transparent 100%);
    }

    @media (max-width: 400px) {
      .card-goals-assists {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .card-goals-assists > .card-section:nth-child(1),
      .card-goals-assists > .card-section:nth-child(3) {
        padding: 0;
      }
      .card-goals-divider {
        display: none;
      }
    }

    .card-player-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-player-item {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      font-size: 0.82rem;
    }

    .card-player-name {
      color: #e6edf3;
      font-weight: 500;
    }

    .card-player-stat {
      color: #8b949e;
      font-size: 0.75rem;
    }

    /* Highlights - compact list */
    .card-top3 {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card-top3-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }

    .card-top3-medal {
      font-size: 0.9rem;
      flex-shrink: 0;
      width: 1.2rem;
      text-align: center;
    }

    .card-top3-name {
      color: #e6edf3;
      font-weight: 500;
    }

    .card-top3-rating {
      color: #7ee787;
      font-weight: 600;
    }

    .card-team-avg {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 0.35rem;
    }

    /* Category highlight blocks - full width stacked */
    .card-highlight {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .card-hl-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
    }

    .card-hl-stats {
      font-size: 0.78rem;
      color: #8b949e;
    }

    .card-hl-phrase {
      font-size: 0.82rem;
      color: #7ee787;
      font-style: italic;
      line-height: 1.4;
      margin-top: 0.3rem;
    }

    .card-hl-phrase.warning {
      color: #f0883e;
    }

    /* Bagre section - structured layout */
    .card-bagre {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-bagre-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
    }

    .card-bagre-reason {
      font-size: 0.78rem;
      color: #8b949e;
      line-height: 1.4;
    }

    .card-bagre-stats {
      font-size: 0.75rem;
      color: #8b949e;
      line-height: 1.4;
    }

    .card-bagre-phrase {
      font-size: 0.82rem;
      color: #f0883e;
      font-style: italic;
      line-height: 1.4;
      margin-top: 0.2rem;
    }

    .card-footer {
      padding: 0.6rem;
      text-align: center;
      font-size: 0.7rem;
      color: #6e7681;
      background: rgba(0, 0, 0, 0.25);
      border-top: 1px solid #30363d;
    }

    .card-actions {
      padding: 0.75rem 1rem;
      border-top: 1px solid #21262d;
    }

    /* Mobile: canvas uses full width */
    @media (max-width: 500px) {
      .card-canvas {
        max-width: 100%;
        padding: 0.5rem;
      }

      .card-header {
        padding: 0.85rem 1rem;
      }

      .card-score {
        font-size: 1.5rem;
      }

      .card-team-name {
        font-size: 0.8rem;
        max-width: 90px;
      }

      .card-body {
        padding: 0 1rem 0.85rem;
      }
    }

    /* ===== Spinner ===== */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Mobile adjustments ===== */
    @media (max-width: 480px) {
      body { padding: 0.65rem; }
      .main-grid { gap: 0.6rem; }
      .match-team { max-width: 75px; font-size: 0.7rem; }
      .match-score { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Main Grid: Left Column + Right Column (Card) -->
    <div class="main-grid">
      <!-- Left Column -->
      <div class="left-column">
        <!-- Actions Panel -->
        <div class="panel actions-panel">
          <div class="panel-title">Ações</div>
          <div class="panel-body">
            <button class="btn btn-primary" id="btn-refresh" onclick="notify()">
              <span class="btn-icon">🔄</span>
              <span id="btn-refresh-text">Atualizar agora</span>
            </button>
            <!-- Monitoring Status -->
            <div class="monitoring-status" id="monitoring-status">
              <span class="monitoring-dot"></span>
              <div class="monitoring-info">
                <span class="monitoring-state" id="monitoring-state">—</span>
                <span class="monitoring-detail" id="monitoring-detail">—</span>
              </div>
            </div>
          </div>
          <div class="feedback-container" id="feedback-container" style="display: none;"></div>
        </div>

        <!-- Latest Match Panel -->
        <div class="panel match-panel">
          <div class="panel-title">Última Partida</div>
          <div class="panel-body" id="match-body">
            <div class="empty-state" id="match-empty">
              <div class="empty-state-icon">⚽</div>
              <div>Carregando...</div>
            </div>
            <div id="match-content" style="display: none;">
              <div class="match-row">
                <div class="match-team" id="match-our-name">—</div>
                <div class="match-score">
                  <span id="match-our-score">0</span>
                  <span class="match-score-sep">×</span>
                  <span id="match-opp-score">0</span>
                </div>
                <div class="match-team" id="match-opp-name">—</div>
              </div>
              <div class="match-info">
                <span class="result-badge" id="match-result-badge">—</span>
                <span id="match-date">—</span>
              </div>
              <div class="match-divider"></div>
              <div class="match-status" id="match-status">
                <span class="match-status-icon">—</span>
                <span id="match-status-text">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Developer Panel -->
        <div class="panel dev-panel" id="dev-panel" style="display: none;">
          <div class="panel-title">🧪 Simulador</div>
          <div class="panel-body">
            <div class="dev-info">
              <span class="dev-info-text">⚠️ Nenhuma notificação enviada ao Discord</span>
            </div>
            <div class="dev-actions">
              <button class="btn btn-primary" id="btn-simulate" onclick="devSimulate()">
                <span class="btn-icon">▶️</span>
                <span id="btn-simulate-text">Simular</span>
              </button>
              <button class="btn btn-outline" id="btn-dev-reset" onclick="devReset()">
                <span class="btn-icon">🗑️</span>
                <span>Reset</span>
              </button>
            </div>
            <div class="dev-status" id="dev-status"></div>
          </div>
        </div>

        <!-- Settings Panel -->
        <div class="panel settings-panel">
          <a href="/settings" class="settings-link">
            <span>⚙️</span>
            <span>Configurações</span>
          </a>
          <span class="network-url" id="network-url"></span>
        </div>
      </div>

      <!-- Right Column: Match Card (rendered directly, no outer panel) -->
      <div class="right-column" id="card-panel">
        <!-- Simulation Indicator -->
        <div class="simulation-indicator" id="simulation-indicator">
          <span>🧪</span>
          <span>Simulação — Não publicado no Discord</span>
        </div>
        <!-- Empty State -->
        <div class="card-empty" id="card-empty">
          <div class="card-empty-icon">🎴</div>
          <div class="card-empty-text">Nenhuma partida processada ainda</div>
        </div>
        <!-- Card Content - Centered Canvas -->
        <div id="card-content" style="display: none;">
          <div class="card-canvas">
            <div class="match-card" id="match-card">
              <div class="card-header">
                <div class="card-result-badge" id="card-result-badge"></div>
                <div class="card-score-row">
                  <div class="card-team-name" id="card-our-name"></div>
                  <div class="card-score">
                    <span id="card-our-score"></span>
                    <span class="card-score-sep">×</span>
                    <span id="card-opp-score"></span>
                  </div>
                  <div class="card-team-name" id="card-opp-name"></div>
                </div>
                <div class="card-date" id="card-date"></div>
              </div>
              <div class="card-body" id="card-body"></div>
              <div class="card-footer">EA FC 26 — Associação BF</div>
            </div>
          </div>
        </div>
        <!-- Save Image Button -->
        <div class="card-actions" id="card-actions" style="display: none;">
          <button class="btn btn-primary" id="btn-save-card" onclick="saveCard()">
            <span class="btn-icon">📥</span>
            <span id="btn-save-card-text">Salvar Imagem</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== State =====
    let lastMatchData = null;
    let isMatchSimulated = false;

    // ===== Initialize =====
    (function init() {
      loadNetworkInfo();
      loadLatestMatch();
      refreshPollingStatus();
      setInterval(refreshPollingStatus, 10000);
      setInterval(loadLatestMatch, 30000);
    })();

    function loadNetworkInfo() {
      fetch('/api/settings/info')
        .then(r => r.json())
        .then(info => {
          if (info.networkUrl) {
            document.getElementById('network-url').innerHTML =
              '<a href="' + esc(info.networkUrl) + '">' + esc(info.networkUrl) + '</a>';
          }
          if (info.devMode) {
            document.getElementById('dev-panel').style.display = 'block';
          }
        })
        .catch(() => {});
    }

    // ===== Load Latest Match =====
    function loadLatestMatch() {
      fetch('/api/match-card/latest')
        .then(r => r.json())
        .then(data => {
          if (data.status === 'success' && data.presentation) {
            lastMatchData = data.presentation;
            isMatchSimulated = data.simulated || false;
            renderDashboard(data.presentation, isMatchSimulated);
          } else {
            lastMatchData = null;
            isMatchSimulated = false;
            renderEmptyState(data.message || 'Nenhuma partida encontrada');
          }
        })
        .catch(() => {
          renderEmptyState('Erro ao carregar partida');
        });
    }

    // ===== Render Dashboard =====
    function renderDashboard(p, simulated) {
      renderLatestMatchPanel(p, simulated);
      renderCardPanel(p, simulated);
    }

    function renderLatestMatchPanel(p, simulated) {
      document.getElementById('match-empty').style.display = 'none';
      document.getElementById('match-content').style.display = 'block';

      document.getElementById('match-our-name').textContent = p.ourName || '—';
      document.getElementById('match-opp-name').textContent = p.oppName || '—';
      document.getElementById('match-our-score').textContent = p.ourScore ?? '0';
      document.getElementById('match-opp-score').textContent = p.oppScore ?? '0';

      const badge = document.getElementById('match-result-badge');
      if (p.outcome) {
        badge.textContent = p.outcome.label || '—';
        badge.className = 'result-badge ' + (p.outcome.type || '').toLowerCase();
      }

      document.getElementById('match-date').textContent = p.date || '—';

      if (simulated) {
        updateMatchStatus('simulated');
      } else {
        updateMatchStatus('published');
      }
    }

    function renderCardPanel(p, simulated) {
      const panel = document.getElementById('card-panel');
      const empty = document.getElementById('card-empty');
      const content = document.getElementById('card-content');
      const actions = document.getElementById('card-actions');

      if (simulated) {
        panel.classList.add('simulated');
      } else {
        panel.classList.remove('simulated');
      }

      empty.style.display = 'none';
      content.style.display = 'block';
      actions.style.display = 'block';

      const badge = document.getElementById('card-result-badge');
      badge.textContent = p.outcome.label;
      badge.className = 'card-result-badge ' + p.outcome.type.toLowerCase();

      document.getElementById('card-our-name').textContent = p.ourName;
      document.getElementById('card-opp-name').textContent = p.oppName;
      document.getElementById('card-our-score').textContent = p.ourScore;
      document.getElementById('card-opp-score').textContent = p.oppScore;
      document.getElementById('card-date').textContent = '📅 ' + p.date;

      const body = document.getElementById('card-body');
      let html = '';

      // Goals & Assists - ONLY section with two columns
      if (p.goals || p.assists) {
        html += '<div class="card-divider"></div>';
        if (p.goals && p.assists) {
          html += '<div class="card-goals-assists">';
          html += renderPlayerList('⚽ GOLS', p.goals.scorers, s => ({ name: s.name, stat: `×${s.count}` }));
          html += '<div class="card-goals-divider"></div>';
          html += renderPlayerList('🎯 ASSISTÊNCIAS', p.assists.assisters, a => ({ name: a.name, stat: `×${a.count}` }));
          html += '</div>';
        } else if (p.goals) {
          html += renderPlayerList('⚽ GOLS', p.goals.scorers, s => ({ name: s.name, stat: `×${s.count}` }));
        } else {
          html += renderPlayerList('🎯 ASSISTÊNCIAS', p.assists.assisters, a => ({ name: a.name, stat: `×${a.count}` }));
        }
      }

      // Highlights - compact stacked
      if (p.highlights) {
        html += '<div class="card-divider"></div>';
        html += '<div class="card-section"><div class="card-section-title">🥇 DESTAQUES</div>';
        html += '<div class="card-top3">';
        p.highlights.top3.forEach(t => {
          html += `<div class="card-top3-item"><span class="card-top3-medal">${t.medal}</span><span class="card-top3-name">${esc(t.name)}</span><span class="card-top3-rating">${t.rating}</span></div>`;
        });
        html += '</div>';
        if (p.highlights.teamAverage) {
          html += `<div class="card-team-avg">⭐ Média: ${p.highlights.teamAverage}</div>`;
        }
        html += '</div>';
      }

      // Craque - full width stacked
      if (p.craque) {
        html += '<div class="card-divider"></div>';
        html += renderHighlight('⭐ CRAQUE DA PARTIDA', p.craque.name, p.craque.reason, p.craque.phrase);
      }

      // Perigo - full width stacked
      if (p.perigoConstante) {
        html += '<div class="card-divider"></div>';
        const pc = p.perigoConstante;
        html += renderHighlight('🔥 PERIGO CONSTANTE', pc.name, `${pc.shots} chutes • ${pc.goals} gols`, pc.phrase);
      }

      // Bagre - full width with clear structure
      if (p.bagre) {
        html += '<div class="card-divider"></div>';
        html += '<div class="card-section"><div class="card-section-title">🍍 BAGRE DA PARTIDA</div>';
        html += '<div class="card-bagre">';
        html += `<span class="card-bagre-name">${esc(p.bagre.name)}</span>`;

        // Rating and reason
        html += `<span class="card-bagre-reason">Nota ${esc(p.bagre.rating)} · ${esc(p.bagre.reason)}</span>`;

        // Statistics (if present)
        const stats = [];
        if (p.bagre.tackleStats) {
          stats.push(`🛡️ Desarmes: ${esc(p.bagre.tackleStats)}`);
        }
        if (p.bagre.passStats) {
          stats.push(`📉 Passes: ${esc(p.bagre.passStats)}`);
        }
        if (stats.length > 0) {
          html += `<span class="card-bagre-stats">${stats.join(' · ')}</span>`;
        }

        // Single phrase (always present)
        html += `<span class="card-bagre-phrase">"${esc(p.bagre.phrase)}"</span>`;

        html += '</div></div>';
      }

      // Xerife - full width stacked
      if (p.xerife) {
        html += '<div class="card-divider"></div>';
        const x = p.xerife;
        html += renderHighlight('🚧 XERIFE', x.name, `${x.tacklesMade}/${x.tackleAttempts} desarmes (${x.successRate}%)`, x.phrase);
      }

      // Precisão - full width stacked
      if (p.passePrecisao) {
        html += '<div class="card-divider"></div>';
        const pp = p.passePrecisao;
        html += renderHighlight('🎯 PASSE PRECISÃO', pp.name, `${pp.passesMade}/${pp.passAttempts} passes (${pp.accuracy}%)`, pp.phrase);
      }

      // Correio - full width stacked
      if (p.correioExtraviado) {
        html += '<div class="card-divider"></div>';
        const ce = p.correioExtraviado;
        html += renderHighlight('📮 CORREIO EXTRAVIADO', ce.name, `❌ ${ce.missedPasses} passes errados`, ce.phrase, 'warning');
      }

      // Goleiro - full width stacked
      if (p.muralha) {
        html += '<div class="card-divider"></div>';
        const m = p.muralha;
        const savesText = m.saves === 1 ? '1 defesa' : `${m.saves} defesas`;
        const goalsText = m.goalsConceded === 1 ? '1 gol sofrido' : `${m.goalsConceded} gols sofridos`;
        html += renderHighlight('🧤 MURALHA', m.name, `${savesText} • ${goalsText}`, m.phrase);
      }

      body.innerHTML = html;
    }

    function renderPlayerList(title, items, mapper) {
      let html = `<div class="card-section"><div class="card-section-title">${title}</div><div class="card-player-list">`;
      items.forEach(item => {
        const { name, stat } = mapper(item);
        html += `<div class="card-player-item"><span class="card-player-name">${esc(name)}</span><span class="card-player-stat">${stat}</span></div>`;
      });
      html += '</div></div>';
      return html;
    }

    function renderHighlight(title, name, stats, phrase, variant) {
      const phraseClass = variant === 'warning' ? 'card-hl-phrase warning' : 'card-hl-phrase';
      return `<div class="card-section">
        <div class="card-section-title">${title}</div>
        <div class="card-highlight">
          <span class="card-hl-name">${esc(name)}</span>
          <span class="card-hl-stats">${esc(stats)}</span>
          <span class="${phraseClass}">"${esc(phrase)}"</span>
        </div>
      </div>`;
    }

    function renderEmptyState(message) {
      document.getElementById('match-empty').style.display = 'block';
      document.getElementById('match-content').style.display = 'none';
      document.getElementById('match-empty').innerHTML =
        '<div class="empty-state-icon">⚽</div><div>' + esc(message) + '</div>';

      document.getElementById('card-panel').classList.remove('simulated');
      document.getElementById('card-empty').style.display = 'block';
      document.getElementById('card-content').style.display = 'none';
      document.getElementById('card-actions').style.display = 'none';
    }

    function updateMatchStatus(status, customText) {
      const statusEl = document.getElementById('match-status');
      const iconEl = statusEl.querySelector('.match-status-icon');
      const textEl = document.getElementById('match-status-text');

      statusEl.className = 'match-status ' + status;

      if (status === 'published') {
        iconEl.textContent = '✅';
        textEl.textContent = customText || 'Publicada no Discord';
      } else if (status === 'simulated') {
        iconEl.textContent = '🧪';
        textEl.textContent = customText || 'Simulação';
      } else {
        iconEl.textContent = 'ℹ️';
        textEl.textContent = customText || '—';
      }
    }

    // ===== Save Card Image =====
    async function saveCard() {
      const btn = document.getElementById('btn-save-card');
      const btnText = document.getElementById('btn-save-card-text');
      const card = document.getElementById('match-card');

      if (!card || !lastMatchData) return;

      btn.disabled = true;
      btnText.textContent = 'Salvando...';

      try {
        const canvas = await html2canvas(card, {
          backgroundColor: '#0d1117',
          scale: 2,
          useCORS: true,
          logging: false,
        });

        const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
        const link = document.createElement('a');
        link.download = generateFilename();
        link.href = dataUrl;
        link.click();
      } catch (e) {
        console.error('Erro ao gerar imagem:', e);
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Salvar Imagem';
      }
    }

    function generateFilename() {
      if (!lastMatchData) return 'match-card.jpg';
      const p = lastMatchData;
      const prefix = isMatchSimulated ? 'sim-' : '';
      return `${prefix}${sanitizeName(p.ourName)}-${p.ourScore}x${p.oppScore}-${sanitizeName(p.oppName)}.jpg`;
    }

    function sanitizeName(str) {
      if (!str) return 'Time';
      return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
    }

    // ===== Polling Status =====
    function refreshPollingStatus() {
      fetch('/api/polling/status')
        .then(r => r.json())
        .then(ps => {
          const container = document.getElementById('monitoring-status');
          const state = document.getElementById('monitoring-state');
          const detail = document.getElementById('monitoring-detail');

          if (ps.enabled) {
            container.className = 'monitoring-status active';
            state.textContent = 'Monitorando';
            // Calculate seconds until next check
            if (ps.nextCheck) {
              const next = new Date(ps.nextCheck);
              const now = new Date();
              const diffSec = Math.max(0, Math.round((next - now) / 1000));
              detail.textContent = `Próxima verificação em ${diffSec}s`;
            } else {
              detail.textContent = `Intervalo: ${ps.intervalSeconds || 60}s`;
            }
          } else {
            container.className = 'monitoring-status inactive';
            state.textContent = 'Pausado';
            detail.textContent = 'Monitoramento automático inativo';
          }
        })
        .catch(() => {
          const container = document.getElementById('monitoring-status');
          container.className = 'monitoring-status inactive';
          document.getElementById('monitoring-state').textContent = '—';
          document.getElementById('monitoring-detail').textContent = 'Erro ao obter status';
        });
    }

    // ===== Actions =====
    async function notify() {
      const btn = document.getElementById('btn-refresh');
      const btnText = document.getElementById('btn-refresh-text');
      const feedback = document.getElementById('feedback-container');

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';
      feedback.style.display = 'none';

      try {
        const res = await fetch('/api/matches/notify-latest', { method: 'POST' });
        const data = await res.json();
        showFeedback(data);
        loadLatestMatch();
        refreshPollingStatus();
      } catch (e) {
        showFeedback({ status: 'error', message: 'Erro de rede' });
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Atualizar agora';
      }
    }

    function showFeedback(data) {
      const container = document.getElementById('feedback-container');
      let icon = 'ℹ️';
      let cssClass = 'info';
      let message = data.message || '';

      switch (data.status) {
        case 'success':
        case 'force_sent':
          icon = '✅'; cssClass = 'success'; break;
        case 'skipped':
        case 'no_matches':
          icon = 'ℹ️'; cssClass = 'info'; break;
        case 'busy':
        case 'webhook_not_configured':
          icon = '⚠️'; cssClass = 'warning'; break;
        case 'error':
        case 'discord_error':
        case 'ea_unavailable':
          icon = '❌'; cssClass = 'error'; break;
      }

      let html = `<div class="feedback ${cssClass}"><span class="feedback-icon">${icon}</span><div class="feedback-text">${esc(message)}`;
      if (data.summary) {
        html += `<div class="feedback-summary">${esc(data.summary)}</div>`;
      }
      html += '</div></div>';

      container.innerHTML = html;
      container.style.display = 'block';

      setTimeout(() => { container.style.display = 'none'; }, 4000);
    }

    // ===== Developer Functions =====
    async function devSimulate() {
      const btn = document.getElementById('btn-simulate');
      const btnText = document.getElementById('btn-simulate-text');
      const status = document.getElementById('dev-status');

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';
      status.textContent = '';

      try {
        const res = await fetch('/api/dev/simulate/latest', { method: 'POST' });
        const data = await res.json();

        if (data.status === 'simulated') {
          status.className = 'dev-status simulated';
        } else if (data.status === 'success') {
          status.className = 'dev-status success';
        } else {
          status.className = 'dev-status error';
        }
        status.textContent = data.message;

        loadLatestMatch();
      } catch (e) {
        status.className = 'dev-status error';
        status.textContent = 'Erro de rede';
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Simular';
      }
    }

    async function devReset() {
      const status = document.getElementById('dev-status');

      try {
        const res = await fetch('/api/dev/reset', { method: 'POST' });
        const data = await res.json();

        status.className = 'dev-status';
        status.textContent = data.message;

        loadLatestMatch();
      } catch (e) {
        status.className = 'dev-status error';
        status.textContent = 'Erro ao resetar';
      }
    }

    // ===== Utility Functions =====

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
