server:
  address: 127.0.0.1   # overridden at runtime by LocalConfigPostProcessor
  port: 8080

app:
  ea:
    base-url: https://proclubs.ea.com/api/fc
    platform: common-gen5
    club-id: "1104972"
    club-name: "Associação BF"
    match-type: leagueMatch   # friendlyMatch | leagueMatch | playoffMatch
    max-result-count: 5
    # EA's endpoint returns 403 without a browser-like User-Agent.
    # Verified by community projects. Change here if EA updates bot detection.
    user-agent: >-
      Mozilla/5.0 (Windows NT 10.0; Win64; x64)
      AppleWebKit/537.36 (KHTML, like Gecko)
      Chrome/124.0.0.0 Safari/537.36
    # Gateway implementation: "playwright" (default) or "webclient"
    # Playwright uses a real headed Chromium browser to bypass Akamai's TLS
    # fingerprinting and JavaScript sensor. On Linux servers, launch with:
    #   xvfb-run -a java -jar app.jar
    client: playwright
    playwright:
      headless: false
      nav-timeout-ms: 30000
      fetch-timeout-ms: 30000
      startup-retries: 1
      initial-page-url: https://proclubs.ea.com

  polling:
    enabled: true
    publish-existing-on-first-run: false

  discord:
    webhook-url: ""   # configured at runtime via /setup — never commit a real URL here

  web:
    network-enabled: false   # overridden by local config file at startup

logging:
  level:
    com.eafc26: INFO
    com.eafc26.discordstats.ea.EaResponseParser: DEBUG
    # TEMPORARY: debug award pipeline — remove once root cause is confirmed
    com.eafc26.discordstats.discord.XerifeSelector: DEBUG
    com.eafc26.discordstats.discord.PerigoConstanteSelector: DEBUG
    com.eafc26.discordstats.discord.DiscordEmbedBuilder: DEBUG
