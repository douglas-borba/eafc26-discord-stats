name: Build macOS App

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission
        run: |
          chmod +x gradlew
          chmod +x scripts/package-macos.sh

      - name: Package macOS application
        run: ./scripts/package-macos.sh

      - name: Inspect generated files
        run: |
          echo "Generated files:"
          find app-bundle -maxdepth 4 -print || true
          find dist -maxdepth 4 -print || true

      - name: Create distribution ZIP
        run: |
          mkdir -p release

          APP_PATH="$(find app-bundle dist -type d -name "*.app" -maxdepth 4 2>/dev/null | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app bundle was not found."
            find . -type d -name "*.app" -print
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "release/EAFC26-Discord-Stats-macOS.zip"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: EAFC26-Discord-Stats-macOS
          path: release/EAFC26-Discord-Stats-macOS.zip
          if-no-files-found: error
          retention-days: 14